name: Deploy Worker (Cloudflare)

# Optional Level-2 push backend (D1 + Cron + Web Push).
# The frontend works without this; enable it only once you've set up the Worker.
#
# Prerequisites (one-time):
#   1. Create D1 + Worker and a real worker/wrangler.toml (from the .example).
#      Because wrangler.toml is gitignored, this workflow recreates it in CI
#      from repo variables/secrets so no IDs are committed. Set:
#        - vars:    CF_D1_DATABASE_ID, VAPID_PUBLIC_KEY, VAPID_SUBJECT, ALLOWED_ORIGIN
#        - secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   2. Store the VAPID private key as a Worker secret once (not in CI):
#        cd worker && wrangler secret put VAPID_PRIVATE_KEY
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["worker/**", ".github/workflows/deploy-worker.yml"]

concurrency:
  group: worker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Guard: only run when the deploy variables are configured.
    if: vars.CF_D1_DATABASE_ID != ''
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate wrangler.toml from template
        env:
          CF_D1_DATABASE_ID: ${{ vars.CF_D1_DATABASE_ID }}
          VAPID_PUBLIC_KEY: ${{ vars.VAPID_PUBLIC_KEY }}
          VAPID_SUBJECT: ${{ vars.VAPID_SUBJECT }}
          ALLOWED_ORIGIN: ${{ vars.ALLOWED_ORIGIN }}
        run: |
          sed \
            -e "s|REPLACE_WITH_D1_DATABASE_ID|${CF_D1_DATABASE_ID}|" \
            -e "s|REPLACE_WITH_VAPID_PUBLIC_KEY|${VAPID_PUBLIC_KEY}|" \
            -e "s|mailto:admin@example.com|${VAPID_SUBJECT}|" \
            -e "s|https://waqt.pages.dev|${ALLOWED_ORIGIN}|" \
            wrangler.toml.example > wrangler.toml

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler@4 deploy
