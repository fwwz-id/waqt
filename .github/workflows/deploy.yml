name: Deploy (Cloudflare Pages)

# CI/CD for the frontend PWA.
#   push to main           -> production deploy
#   pull request           -> build + test only (no deploy)
#   any other pushed branch -> Pages preview deploy
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      # Only deploy on direct pushes (not PRs from forks, which lack secrets).
      # Call wrangler directly (not wrangler-action) so failures surface the
      # real CLI error instead of a generic "bunx failed".
      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID repo secrets."
            exit 1
          fi
          bunx wrangler@4 pages deploy dist \
            --project-name=waqt \
            --branch="${GITHUB_REF_NAME}" \
            --commit-dirty=true
